<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esteira CI/CD - Projeto DevOps</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.25rem;
            color: #576574;
            line-height: 1.6;
        }
        .status-badge {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 1rem;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meu primeiro deploy automatizado</h1>
        <p>Este site foi publicado automaticamente através de um pipeline DevOps real, utilizando GitHub Actions e GitHub Pages.</p>
        <div class="status-badge">Deploy Concluído</div>
        <div class="footer">
            Gerado via GitHub Actions &bull; 2026
        </div>
    </div>
</body>
</html>
