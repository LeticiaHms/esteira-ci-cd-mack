name: Auto PR and Merge

on:
  push:
    branches:
      - 'feature/*'
      - 'fix/*'
      - 'hotfix/*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar e configurar Pull Request
        id: cpr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verifica se já existe uma PR aberta para esta branch
          PR_URL=$(gh pr list --head "${{ github.ref_name }}" --base main --state open --json url --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
            echo "Criando nova Pull Request..."
            gh pr create \
              --title "[Auto PR] Mesclar ${{ github.ref_name }} em main" \
              --body "Esta é uma Pull Request gerada automaticamente pelo pipeline de CI/CD. Origem: ${{ github.ref_name }} -> Destino: main." \
              --base main \
              --head ${{ github.ref_name }} || echo "Não foi possível criar a PR (pode já existir)."
          else
            echo "Pull Request já existe: $PR_URL"
          fi

          # Ativa o auto-merge para a PR desta branch
          echo "Ativando Auto-Merge..."
          gh pr merge ${{ github.ref_name }} --auto --merge || echo "Auto-merge não pôde ser ativado (pode já estar ativo ou sem permissão)."
