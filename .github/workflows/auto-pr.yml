name: Auto PR and Merge

on:
  push:
    branches:
      - 'feature/*'
      - 'fix/*'
      - 'hotfix/*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "auto: atualizações automáticas do desenvolvedor"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: ${{ github.ref_name }}
          delete-branch: true
          title: "[Auto PR] Mesclar ${{ github.ref_name }} em main"
          body: |
            Esta é uma Pull Request gerada automaticamente pelo pipeline de CI/CD.
            
            - **Origem:** `${{ github.ref_name }}`
            - **Destino:** `main`
            - **Autor:** `${{ github.actor }}`
            
            O merge será realizado automaticamente se as verificações de CI passarem.
          labels: |
            automated pr
            automerge
          draft: false

      - name: Ativar Auto-Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
