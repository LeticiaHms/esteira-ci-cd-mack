name: "2. Automação de PR & Merge"

on:
  push:
    branches:
      - 'feature/*'
      - 'fix/*'
      - 'hotfix/*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar Pull Request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr list --head "${{ github.ref_name }}" --base main --state open --json url --jq '.[0].url')
          if [ -z "$PR_URL" ]; then
            echo "Criando nova Pull Request..."
            PR_URL=$(gh pr create \
              --title "[Auto PR] Mesclar ${{ github.ref_name }} em main" \
              --body "PR gerada automaticamente. Origem: ${{ github.ref_name }} -> Destino: main." \
              --base main \
              --head ${{ github.ref_name }})
            echo "PR criada com sucesso: $PR_URL"
          else
            echo "Pull Request já existe: $PR_URL"
          fi
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Ativar e Confirmar Auto-Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Tentando ativar Auto-Merge para: ${{ steps.create_pr.outputs.pr_url }}"
          gh pr merge "${{ steps.create_pr.outputs.pr_url }}" --auto --merge || echo ":::warning:: Auto-merge não pôde ser ativado automaticamente. Verifique se 'Allow auto-merge' está habilitado em Settings > General."
          
          echo "### Resumo da Automação 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **PR:** ${{ steps.create_pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ação:** A PR foi criada. Se o auto-merge falhou, realize o merge manual após o CI passar." >> $GITHUB_STEP_SUMMARY
